name: Validate Godot project
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.7.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
      - name: Import and parse project
        run: godot --headless --editor --quit-after 3 --path .
      - name: Smoke test
        run: godot --headless --path . --quit-after 3
